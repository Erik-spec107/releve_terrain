<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Terrain">
<meta name="theme-color" content="#1a73e8">
<title>Saisie terrain</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a73e8'/%3E%3Cpath d='M256 80c-70.7 0-128 57.3-128 128 0 96 128 244 128 244s128-148 128-244c0-70.7-57.3-128-128-128zm0 172c-24.3 0-44-19.7-44-44s19.7-44 44-44 44 19.7 44 44-19.7 44-44 44z' fill='white'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a73e8'/%3E%3Cpath d='M256 80c-70.7 0-128 57.3-128 128 0 96 128 244 128 244s128-148 128-244c0-70.7-57.3-128-128-128zm0 172c-24.3 0-44-19.7-44-44s19.7-44 44-44 44 19.7 44 44-19.7 44-44 44z' fill='white'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

  .topbar { background: #1a73e8; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 17px; font-weight: 500; flex: 1; }
  .badge { font-size: 12px; background: rgba(255,255,255,0.22); padding: 4px 10px; border-radius: 20px; cursor: pointer; }
  .drive-status { font-size: 11px; padding: 3px 9px; border-radius: 20px; cursor: pointer; }
  .drive-status.on  { background: rgba(255,255,255,0.22); }
  .drive-status.off { background: rgba(255,80,80,0.45); }

  .page { display: none; }
  .page.active { display: block; }

  .form-wrap { padding: 14px; }
  .card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .field { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
  .field:last-child { border-bottom: none; }
  .field label { font-size: 11px; color: #757575; display: block; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
  .field input { width: 100%; font-size: 16px; border: none; outline: none; background: transparent; color: #212121; padding: 0; font-family: inherit; }
  .field input::placeholder { color: #bdbdbd; }
  .field input[type="datetime-local"] { font-size: 15px; }

  /* ── Photos : 1 par ligne, photo + commentaire bien visible ── */
  .photos-section { padding: 12px 16px 14px; }
  .photos-label { font-size: 11px; color: #757575; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 10px; }

  .photo-item { display: flex; gap: 10px; align-items: flex-start; background: #f9f9f9; border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid #f0f0f0; }
  .photo-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
  .photo-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }
  .photo-num { font-size: 12px; color: #1a73e8; font-weight: 600; }
  .photo-comment-input {
    width: 100%; font-size: 14px; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 8px 10px; font-family: inherit; color: #212121; background: white; outline: none;
  }
  .photo-comment-input:focus { border-color: #1a73e8; }
  .photo-comment-input::placeholder { color: #bdbdbd; }
  .photo-item-right { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .del-btn { background: rgba(0,0,0,.45); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .synced-ico { color: #4caf50; font-size: 16px; }

  .add-photo { display: flex; align-items: center; justify-content: center; gap: 8px; background: #f0f4f8; border: 2px dashed #1a73e8; border-radius: 10px; padding: 14px; cursor: pointer; margin-top: 4px; }
  .add-photo span { font-size: 14px; color: #1a73e8; font-weight: 500; }

  .save-wrap { padding: 0 14px 30px; }
  .btn-save { width: 100%; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; border: none; background: #1a73e8; color: white; transition: all .15s; }
  .btn-save:active { background: #185ab4; transform: scale(0.99); }
  .btn-save:disabled { background: #9e9e9e; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; align-items: center; gap: 8px; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.25); max-width: 88vw; text-align: center; background: #323232; }
  .toast.show { display: flex; }
  .toast.ok   { background: #2e7d32; }
  .toast.err  { background: #c62828; }

  .list-wrap { padding: 14px; }
  .list-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .list-head span { font-size: 13px; color: #757575; }
  .btn-export { padding: 8px 14px; border-radius: 8px; border: 1px solid #1a73e8; background: white; color: #1a73e8; font-size: 13px; font-weight: 500; cursor: pointer; }
  .vitem { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.07); display: flex; align-items: center; gap: 12px; }
  .vdot { width: 10px; height: 10px; border-radius: 50%; background: #1a73e8; flex-shrink: 0; }
  .vdot.ok { background: #4caf50; }
  .vinfo { flex: 1; min-width: 0; }
  .vname { font-size: 14px; font-weight: 500; color: #212121; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vmeta { font-size: 12px; color: #757575; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vphotos { font-size: 12px; color: #9e9e9e; flex-shrink: 0; }
  .empty-list { text-align: center; padding: 50px 20px; color: #bdbdbd; }
  .empty-list .e-ico { font-size: 48px; margin-bottom: 10px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; }
  .overlay-box { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; text-align: center; }
  .overlay-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .overlay-box p { font-size: 14px; color: #757575; margin-bottom: 20px; line-height: 1.5; }
  .btn-google { width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; background: #1a73e8; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
  .btn-skip { width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer; border: 1px solid #e0e0e0; background: white; color: #757575; }

  #fileInput { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
  <h1>Saisie terrain</h1>
  <span class="drive-status off" id="driveStatus" onclick="showOverlay()">☁ Drive</span>
  <span class="badge" id="badge" onclick="togglePage()">0 visite</span>
</div>

<!-- OVERLAY DRIVE -->
<div class="overlay" id="driveOverlay">
  <div class="overlay-box">
    <div style="font-size:40px;margin-bottom:12px">☁️</div>
    <h2>Google Drive</h2>
    <p>Les photos seront envoyées dans le dossier <strong>Relevés_Terrain</strong> de votre Drive.</p>
    <button class="btn-google" onclick="connectDrive()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Se connecter avec Google
    </button>
    <button class="btn-skip" onclick="skipDrive()">Continuer sans Drive</button>
  </div>
</div>

<!-- PAGE FORMULAIRE -->
<div class="page active" id="pageForm">
  <div class="form-wrap">
    <div class="card">
      <div class="field">
        <label>Client</label>
        <input type="text" id="client" placeholder="Nom du client" autocomplete="off">
      </div>
      <div class="field">
        <label>Chantier</label>
        <input type="text" id="chantier" placeholder="Nom ou référence du chantier" autocomplete="off">
      </div>
      <div class="field">
        <label>Localisation sur le bâtiment</label>
        <input type="text" id="loc" placeholder="Ex : toiture nord, façade est…" autocomplete="off">
      </div>
      <div class="field">
        <label>Commentaire</label>
        <input type="text" id="commentaire" placeholder="Observations, remarques…" autocomplete="off">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="datetime-local" id="dt">
      </div>
    </div>

    <div class="card">
      <div class="photos-section">
        <div class="photos-label" id="photosLabel">Photos</div>
        <div id="photoList"></div>
        <div class="add-photo" onclick="document.getElementById('fileInput').click()">
          <span style="font-size:22px">📷</span>
          <span>Prendre une photo</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="addPhoto(this)">
      </div>
    </div>
  </div>

  <div class="save-wrap">
    <button class="btn-save" id="btnSave" onclick="save()">Enregistrer</button>
  </div>
</div>

<!-- PAGE LISTE -->
<div class="page" id="pageList">
  <div class="list-wrap">
    <div class="list-head">
      <span id="listCount">0 visite(s)</span>
      <button class="btn-export" onclick="exportJSON()">⬇ Export JSON</button>
    </div>
    <div id="listItems">
      <div class="empty-list">
        <div class="e-ico">📋</div>
        <p style="font-size:14px">Aucune visite enregistrée</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
  const CLIENT_ID = '923335649797-5obt228e0qe7snv735kih1i2hc3njm0u.apps.googleusercontent.com';
  const SCOPES    = 'https://www.googleapis.com/auth/drive.file';
  const FOLDER    = 'Relevés_Terrain';

  let visits   = JSON.parse(localStorage.getItem('terrain_v3') || '[]');
  let pics     = [];
  let onList   = false;
  let token    = localStorage.getItem('drive_token') || null;
  let folderId = localStorage.getItem('drive_folder_id') || null;

  (function init() {
    const n = new Date(); n.setSeconds(0); n.setMilliseconds(0);
    document.getElementById('dt').value = n.toISOString().slice(0,16);
    updateBadge();
    renderList_photos();
    updateDriveUI();
    if (!token) setTimeout(showOverlay, 600);
  })();

  function showOverlay() { document.getElementById('driveOverlay').classList.add('show'); }
  function skipDrive()   { document.getElementById('driveOverlay').classList.remove('show'); }

  function connectDrive() {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: resp => {
        if (resp.error) { showToast('Erreur connexion Drive', 'err'); return; }
        token = resp.access_token;
        localStorage.setItem('drive_token', token);
        skipDrive(); updateDriveUI();
        showToast('✓ Connecté à Google Drive', 'ok');
        ensureFolder();
      }
    });
    client.requestAccessToken();
  }

  function updateDriveUI() {
    const el = document.getElementById('driveStatus');
    el.textContent = token ? '✓ Drive' : '☁ Drive';
    el.className   = 'drive-status ' + (token ? 'on' : 'off');
  }

  async function ensureFolder() {
    if (folderId) return folderId;
    const q   = encodeURIComponent(`name='${FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers: { Authorization: 'Bearer ' + token } });
    const d   = await res.json();
    if (d.files && d.files.length) { folderId = d.files[0].id; }
    else {
      const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: FOLDER, mimeType: 'application/vnd.google-apps.folder' })
      });
      folderId = (await cr.json()).id;
    }
    localStorage.setItem('drive_folder_id', folderId);
    return folderId;
  }

  async function createSubFolder(name, parentId) {
    const r = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
    });
    return (await r.json()).id;
  }

  async function uploadFile(blob, filename, mimeType, parentId) {
    const meta = JSON.stringify({ name: filename, parents: [parentId] });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', blob);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form
    });
    return r.ok;
  }

  // ── Ajout photo : caméra directe ──────────────────────────────────────────
  function addPhoto(input) {
    const f = input.files[0]; if (!f) return;
    const num  = pics.length + 1;
    const ext  = f.name.split('.').pop() || 'jpg';
    const name = 'photo_' + String(num).padStart(3,'0') + '.' + ext;
    const r = new FileReader();
    r.onload = e => {
      pics.push({ name, data: e.target.result, blob: f, comment: '', uploaded: false });
      renderList_photos();
    };
    r.readAsDataURL(f);
    input.value = '';
  }

  // ── Rendu liste photos (1 par ligne, vignette + commentaire) ──────────────
  function renderList_photos() {
    const list = document.getElementById('photoList');
    const lbl  = document.getElementById('photosLabel');
    lbl.textContent = pics.length ? pics.length + ' photo(s)' : 'Photos';
    list.innerHTML  = '';

    pics.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'photo-item';
      row.id = 'prow-' + i;
      row.innerHTML =
        '<img src="' + p.data + '" alt="photo ' + (i+1) + '">' +
        '<div class="photo-item-info">' +
          '<div class="photo-num">📷 ' + p.name + (p.uploaded ? ' ☁✓' : '') + '</div>' +
          '<input class="photo-comment-input" type="text" placeholder="Ajouter un commentaire…" ' +
            'value="' + (p.comment||'').replace(/"/g,'&quot;') + '" ' +
            'oninput="pics[' + i + '].comment=this.value">' +
        '</div>' +
        '<button class="del-btn" onclick="delPic(' + i + ')">✕</button>';
      list.appendChild(row);
    });
  }

  function delPic(i) { pics.splice(i,1); renderList_photos(); }

  // ── Enregistrer ───────────────────────────────────────────────────────────
  async function save() {
    const client   = document.getElementById('client').value.trim();
    const chantier = document.getElementById('chantier').value.trim();
    if (!client)   { showToast('Saisissez le client','err'); return; }
    if (!chantier) { showToast('Saisissez le chantier','err'); return; }

    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Enregistrement…';

    const visitDate = document.getElementById('dt').value || new Date().toISOString();
    const visit = {
      id: Date.now(), client, chantier,
      loc: document.getElementById('loc').value.trim(),
      commentaire: document.getElementById('commentaire').value.trim(),
      date: visitDate, synced: false,
      photos: pics.map(p => ({ name: p.name, comment: p.comment }))
    };

    if (token) {
      try {
        btn.textContent = 'Envoi Drive…';
        const rootId  = await ensureFolder();
        const dateStr = new Date(visitDate).toISOString().slice(0,10);
        const subName = dateStr + '_' + client.replace(/\s+/g,'_') + '_' + chantier.replace(/\s+/g,'_');
        const subId   = await createSubFolder(subName, rootId);

        for (let i = 0; i < pics.length; i++) {
          btn.textContent = 'Photo ' + (i+1) + '/' + pics.length + '…';
          await uploadFile(pics[i].blob, pics[i].name, pics[i].blob.type||'image/jpeg', subId);
          pics[i].uploaded = true;
          // Met à jour le label sans recréer tout le DOM
          const row = document.getElementById('prow-' + i);
          if (row) { const num = row.querySelector('.photo-num'); if(num) num.textContent = '📷 ' + pics[i].name + ' ☁✓'; }
        }

        await uploadFile(
          new Blob([JSON.stringify(visit,null,2)],{type:'application/json'}),
          'donnees.json','application/json', subId
        );
        visit.synced = true; visit.driveFolder = subName;
        showToast('✓ Drive : ' + subName, 'ok');
      } catch(e) {
        console.error(e);
        if (String(e).includes('401')) { token=null; localStorage.removeItem('drive_token'); updateDriveUI(); }
        showToast('Enregistré localement','');
      }
    } else {
      showToast('✓ ' + client + ' — ' + chantier, 'ok');
    }

    visits.push(visit);
    try { localStorage.setItem('terrain_v3', JSON.stringify(visits)); } catch(e) {}
    updateBadge();
    btn.disabled = false; btn.textContent = 'Enregistrer';

    // Reset photos uniquement — champs texte conservés
    pics = [];
    renderList_photos();
  }

  function updateBadge() {
    document.getElementById('badge').textContent = visits.length + ' visite' + (visits.length>1?'s':'');
  }

  function togglePage() {
    onList = !onList;
    document.getElementById('pageForm').classList.toggle('active',!onList);
    document.getElementById('pageList').classList.toggle('active',onList);
    if (onList) renderVisits();
  }

  function renderVisits() {
    document.getElementById('listCount').textContent = visits.length + ' visite(s)';
    const el = document.getElementById('listItems');
    if (!visits.length) {
      el.innerHTML = '<div class="empty-list"><div class="e-ico">📋</div><p style="font-size:14px">Aucune visite</p></div>';
      return;
    }
    el.innerHTML = visits.slice().reverse().map(v => {
      const d = v.date ? new Date(v.date).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}) : '';
      return '<div class="vitem"><div class="vdot '+(v.synced?'ok':'')+'"></div><div class="vinfo"><div class="vname">'+v.client+' — '+v.chantier+'</div><div class="vmeta">'+d+(v.loc?' · '+v.loc:'')+(v.synced?' · ☁✓':'')+'</div></div><div class="vphotos">'+(v.photos||[]).length+' 📷</div></div>';
    }).join('');
  }

  function exportJSON() {
    if (!visits.length) { showToast('Aucune visite','err'); return; }
    const b = new Blob([JSON.stringify(visits,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'tournee_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
  }

  function showToast(msg,type) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.className = 'toast show'+(type?' '+type:'');
    clearTimeout(t._t);
    t._t = setTimeout(()=>t.classList.remove('show'),3500);
  }
</script>
</body>
</html>
