<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Terrain">
<meta name="theme-color" content="#1a73e8">
<title>Saisie terrain</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a73e8'/%3E%3Cpath d='M256 80c-70.7 0-128 57.3-128 128 0 96 128 244 128 244s128-148 128-244c0-70.7-57.3-128-128-128zm0 172c-24.3 0-44-19.7-44-44s19.7-44 44-44 44 19.7 44 44-19.7 44-44 44z' fill='white'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a73e8'/%3E%3Cpath d='M256 80c-70.7 0-128 57.3-128 128 0 96 128 244 128 244s128-148 128-244c0-70.7-57.3-128-128-128zm0 172c-24.3 0-44-19.7-44-44s19.7-44 44-44 44 19.7 44 44-19.7 44-44 44z' fill='white'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

  .topbar { background: #1a73e8; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 17px; font-weight: 500; flex: 1; }
  .badge { font-size: 12px; background: rgba(255,255,255,0.22); padding: 4px 10px; border-radius: 20px; cursor: pointer; white-space: nowrap; }

  .page { display: none; }
  .page.active { display: block; }

  .form-wrap { padding: 14px; }
  .card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .field { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
  .field:last-child { border-bottom: none; }
  .field label { font-size: 11px; color: #757575; display: block; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
  .field input { width: 100%; font-size: 16px; border: none; outline: none; background: transparent; color: #212121; padding: 0; font-family: inherit; }
  .field input::placeholder { color: #bdbdbd; }
  .field input[type="datetime-local"] { font-size: 15px; }

  .photos-section { padding: 12px 16px 14px; }
  .photos-label { font-size: 11px; color: #757575; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 10px; }
  .photo-item { display: flex; gap: 10px; align-items: center; background: #f9f9f9; border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid #f0f0f0; }
  .photo-item img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
  .photo-item-info { flex: 1; min-width: 0; }
  .photo-num { font-size: 12px; color: #1a73e8; font-weight: 600; }
  .del-btn { background: rgba(0,0,0,.4); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-photo { display: flex; align-items: center; justify-content: center; gap: 8px; background: #f0f4f8; border: 2px dashed #1a73e8; border-radius: 10px; padding: 14px; cursor: pointer; margin-top: 4px; }
  .add-photo span { font-size: 14px; color: #1a73e8; font-weight: 500; }

  .save-wrap { padding: 0 14px 30px; }
  .btn-save { width: 100%; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; border: none; background: #1a73e8; color: white; transition: all .15s; }
  .btn-save:active { background: #185ab4; transform: scale(0.99); }
  .btn-save:disabled { background: #9e9e9e; }

  /* Page tournée */
  .list-wrap { padding: 14px; }
  .list-head { margin-bottom: 12px; }
  .list-head span { font-size: 13px; color: #757575; display: block; margin-bottom: 10px; }
  .btn-zip { width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; background: #2e7d32; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
  .btn-zip:disabled { background: #9e9e9e; }
  .btn-raz { width: 100%; padding: 11px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #f44336; background: white; color: #f44336; margin-bottom: 14px; }
  .vitem { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.07); display: flex; align-items: center; gap: 12px; }
  .vdot { width: 10px; height: 10px; border-radius: 50%; background: #1a73e8; flex-shrink: 0; }
  .vinfo { flex: 1; min-width: 0; }
  .vname { font-size: 14px; font-weight: 500; color: #212121; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vmeta { font-size: 12px; color: #757575; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vphotos { font-size: 12px; color: #9e9e9e; flex-shrink: 0; }
  .empty-list { text-align: center; padding: 50px 20px; color: #bdbdbd; }
  .empty-list .e-ico { font-size: 48px; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; align-items: center; gap: 8px; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.25); max-width: 88vw; text-align: center; background: #323232; }
  .toast.show { display: flex; }
  .toast.ok  { background: #2e7d32; }
  .toast.err { background: #c62828; }

  #fileInput { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
  <h1>Saisie terrain</h1>
  <span class="badge" id="badge" onclick="togglePage()">0 visite</span>
</div>

<!-- PAGE FORMULAIRE -->
<div class="page active" id="pageForm">
  <div class="form-wrap">
    <div class="card">
      <div class="field">
        <label>Client</label>
        <input type="text" id="client" placeholder="Nom du client" autocomplete="off">
      </div>
      <div class="field">
        <label>Chantier</label>
        <input type="text" id="chantier" placeholder="Nom ou référence du chantier" autocomplete="off">
      </div>
      <div class="field">
        <label>Localisation sur le bâtiment</label>
        <input type="text" id="loc" placeholder="Ex : toiture nord, façade est…" autocomplete="off">
      </div>
      <div class="field">
        <label>Commentaire</label>
        <input type="text" id="commentaire" placeholder="Observations, remarques…" autocomplete="off">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="datetime-local" id="dt">
      </div>
    </div>

    <div class="card">
      <div class="photos-section">
        <div class="photos-label" id="photosLabel">Photos</div>
        <div id="photoList"></div>
        <div class="add-photo" onclick="document.getElementById('fileInput').click()">
          <span style="font-size:22px">📷</span>
          <span>Prendre une photo</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="addPhoto(this)">
      </div>
    </div>
  </div>
  <div class="save-wrap">
    <button class="btn-save" id="btnSave" onclick="save()">Enregistrer</button>
  </div>
</div>

<!-- PAGE TOURNÉE -->
<div class="page" id="pageList">
  <div class="list-wrap">
    <div class="list-head">
      <span id="listCount">0 visite(s)</span>
      <button class="btn-zip" id="btnZip" onclick="exportZip()">
        📦 Exporter la tournée (ZIP)
      </button>
      <button class="btn-raz" onclick="razTournee()">🗑 Nouvelle tournée</button>
    </div>
    <div id="listItems">
      <div class="empty-list">
        <div class="e-ico">📋</div>
        <p style="font-size:14px">Aucune visite enregistrée</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<!-- JSZip pour générer le ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  // Stockage en mémoire vive (pas de localStorage pour les photos = pas de limite)
  // visits = données texte, allPics = toutes les photos de la session par visite id
  let visits  = JSON.parse(localStorage.getItem('terrain_v4') || '[]');
  let allPics = {}; // { visitId: [{name, blob, data}] }
  let pics    = []; // photos de la visite en cours
  let onList  = false;

  (function init() {
    const n = new Date(); n.setSeconds(0); n.setMilliseconds(0);
    document.getElementById('dt').value = n.toISOString().slice(0,16);
    updateBadge();
    renderPhotos();
  })();

  // ── Photo ─────────────────────────────────────────────────────────────────
  function addPhoto(input) {
    const f = input.files[0]; if (!f) return;
    const num  = pics.length + 1;
    const ext  = f.name.split('.').pop() || 'jpg';
    const name = 'photo_' + String(num).padStart(3,'0') + '.' + ext;
    const r = new FileReader();
    r.onload = e => {
      pics.push({ name, blob: f, data: e.target.result });
      renderPhotos();
    };
    r.readAsDataURL(f);
    input.value = '';
  }

  function renderPhotos() {
    const list = document.getElementById('photoList');
    const lbl  = document.getElementById('photosLabel');
    lbl.textContent = pics.length ? pics.length + ' photo(s)' : 'Photos';
    list.innerHTML = '';
    pics.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'photo-item';
      row.innerHTML = '<img src="' + p.data + '" alt="photo">'
        + '<div class="photo-item-info"><div class="photo-num">📷 ' + p.name + '</div></div>'
        + '<button class="del-btn" onclick="delPic(' + i + ')">✕</button>';
      list.appendChild(row);
    });
  }

  function delPic(i) { pics.splice(i,1); renderPhotos(); }

  // ── Enregistrer ───────────────────────────────────────────────────────────
  function save() {
    const client   = document.getElementById('client').value.trim();
    const chantier = document.getElementById('chantier').value.trim();
    if (!client)   { showToast('Saisissez le client','err'); return; }
    if (!chantier) { showToast('Saisissez le chantier','err'); return; }

    const visitDate = document.getElementById('dt').value || new Date().toISOString();
    const id = Date.now();
    const visit = {
      id, client, chantier,
      loc:         document.getElementById('loc').value.trim(),
      commentaire: document.getElementById('commentaire').value.trim(),
      date:        visitDate,
      photos:      pics.map(p => ({ name: p.name }))
    };

    // Stocker les blobs en mémoire vive pour le ZIP
    allPics[id] = pics.map(p => ({ name: p.name, blob: p.blob }));

    visits.push(visit);
    try { localStorage.setItem('terrain_v4', JSON.stringify(visits)); } catch(e) {}

    updateBadge();
    showToast('✓ ' + client + ' — ' + chantier + ' (' + pics.length + ' photo(s))', 'ok');

    // Reset photos seulement
    pics = [];
    renderPhotos();
  }

  function updateBadge() {
    const n = visits.length;
    document.getElementById('badge').textContent = n + ' visite' + (n>1?'s':'');
  }

  function togglePage() {
    onList = !onList;
    document.getElementById('pageForm').classList.toggle('active', !onList);
    document.getElementById('pageList').classList.toggle('active', onList);
    if (onList) renderVisits();
  }

  function renderVisits() {
    const total = visits.length;
    const totalPics = visits.reduce((s,v) => s+(v.photos||[]).length, 0);
    document.getElementById('listCount').textContent = total + ' visite(s) · ' + totalPics + ' photo(s)';
    document.getElementById('btnZip').disabled = total === 0;
    const el = document.getElementById('listItems');
    if (!total) {
      el.innerHTML = '<div class="empty-list"><div class="e-ico">📋</div><p style="font-size:14px">Aucune visite</p></div>';
      return;
    }
    el.innerHTML = visits.slice().reverse().map(v => {
      const d = v.date ? new Date(v.date).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}) : '';
      const inMem = allPics[v.id] ? ' 💾' : '';
      return '<div class="vitem"><div class="vdot"></div><div class="vinfo">'
        + '<div class="vname">' + v.client + ' — ' + v.chantier + '</div>'
        + '<div class="vmeta">' + d + (v.loc?' · '+v.loc:'') + (v.commentaire?' · '+v.commentaire:'') + '</div>'
        + '</div><div class="vphotos">' + (v.photos||[]).length + ' 📷' + inMem + '</div></div>';
    }).join('');
  }

  // ── Export ZIP ────────────────────────────────────────────────────────────
  async function exportZip() {
    if (!visits.length) { showToast('Aucune visite','err'); return; }
    const btn = document.getElementById('btnZip');
    btn.disabled = true; btn.textContent = '⏳ Génération ZIP…';

    try {
      const zip = new JSZip();
      const dateStr = new Date().toISOString().slice(0,10);
      const root = zip.folder('tournee_' + dateStr);

      // JSON global
      root.file('tournee.json', JSON.stringify(visits, null, 2));

      // Un sous-dossier par visite avec les photos
      for (const v of visits) {
        const safe = v.client.replace(/\s+/g,'_') + '_' + v.chantier.replace(/\s+/g,'_');
        const vFolder = root.folder(safe);
        // JSON de la visite
        vFolder.file('donnees.json', JSON.stringify(v, null, 2));
        // Photos si disponibles en mémoire
        const picsForVisit = allPics[v.id] || [];
        for (const p of picsForVisit) {
          vFolder.file(p.name, p.blob);
        }
      }

      const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tournee_' + dateStr + '.zip';
      a.click();
      showToast('✓ ZIP téléchargé — déposez-le sur Drive !', 'ok');
    } catch(e) {
      console.error(e);
      showToast('Erreur génération ZIP','err');
    }

    btn.disabled = false; btn.textContent = '📦 Exporter la tournée (ZIP)';
  }

  // ── Nouvelle tournée ──────────────────────────────────────────────────────
  function razTournee() {
    if (!confirm('Effacer toutes les visites de cette tournée ?')) return;
    visits = []; allPics = {};
    localStorage.removeItem('terrain_v4');
    updateBadge();
    renderVisits();
    showToast('Tournée effacée','ok');
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.className = 'toast show' + (type?' '+type:'');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
