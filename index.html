<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Saisie Terrain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8; --blue-lt: #e8f0fe;
      --bg: #f4f4f2; --card: #fff; --border: #dddbd4;
      --text: #1a1a18; --muted: #6b6b67;
      --green: #2e7d32; --green-lt: #e8f5e9;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
    header { background: var(--blue); color: #fff; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 17px; font-weight: 600; }
    #hdr-count { font-size: 12px; opacity: .8; }
    #btn-export { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
    nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
    nav button { flex: 1; padding: 12px; background: none; border: none; border-bottom: 3px solid transparent; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; font-family: inherit; }
    nav button.active { color: var(--blue); border-bottom-color: var(--blue); }
    .page { display: none; padding: 12px 12px 48px; }
    .page.active { display: block; }
    .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; }
    .card-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    input[type=text] { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--bg); color: var(--text); font-family: inherit; margin-bottom: 8px; }
    input[type=text]:last-child { margin-bottom: 0; }
    input[type=text]:focus { outline: none; border-color: var(--blue); background: #fff; }
    textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--bg); color: var(--text); font-family: inherit; resize: none; height: 80px; }
    textarea:focus { outline: none; border-color: var(--blue); background: #fff; }

    /* Photo */
    #file-inp { display: none; }
    #photo-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; color: var(--muted); font-size: 14px; cursor: pointer; }
    #photo-prev { display: none; width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; border: 1.5px solid var(--border); }
    #btn-del-photo { display: none; margin-top: 8px; background: #fcebeb; color: #a32d2d; border: 1px solid #f09595; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .photo-info { font-size: 11px; color: var(--blue); margin-top: 6px; background: var(--blue-lt); padding: 6px 10px; border-radius: 8px; display: none; }

    /* Bouton save */
    #btn-save { display: block; width: 100%; margin-top: 4px; padding: 16px; background: #9FE1CB; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: default; font-family: inherit; }
    #btn-save.ready { background: var(--blue); cursor: pointer; }
    #form-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* Toast */
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1a18; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform .3s; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Liste */
    .stats { display: flex; gap: 8px; margin-bottom: 12px; }
    .schip { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; font-size: 11px; color: var(--muted); }
    .schip strong { display: block; font-size: 22px; font-weight: 700; color: var(--text); }
    .ditem { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
    .dthumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); cursor: pointer; }
    .dnophoto { width: 64px; height: 64px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .dbody { flex: 1; min-width: 0; }
    .dtitle { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dmeta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.7; }
    .ddel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 4px; }
    .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 15px; }

    /* Modal export */
    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end; justify-content: center; }
    #overlay.open { display: flex; }
    #modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 22px 18px 40px; width: 100%; max-width: 480px; }
    #modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    #modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .mbtn { display: block; width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>

<header>
  <div><h1>Saisie Terrain</h1><span id="hdr-count">0 visite</span></div>
  <button id="btn-export" onclick="openExport()">Export ⬇</button>
</header>
<nav>
  <button class="active" onclick="showPage('saisie',this)">＋ Saisie</button>
  <button onclick="showPage('liste',this)">Liste</button>
</nav>

<!-- PAGE SAISIE -->
<div id="page-saisie" class="page active">

  <div class="card">
    <div class="card-title">Client</div>
    <input type="text" id="f-client" placeholder="Nom du client">
  </div>

  <div class="card">
    <div class="card-title">Chantier</div>
    <input type="text" id="f-chantier" placeholder="Nom ou référence du chantier">
  </div>

  <div class="card">
    <div class="card-title">Localisation sur le bâtiment</div>
    <input type="text" id="f-loc" placeholder="Ex : toiture nord, façade est…">
  </div>

  <div class="card">
    <div class="card-title">Commentaire</div>
    <textarea id="f-comment" placeholder="Observations, remarques…"></textarea>
  </div>

  <div class="card">
    <div class="card-title">Photo</div>
    <input type="file" id="file-inp" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    <div id="photo-zone" onclick="document.getElementById('file-inp').click()">📷 Prendre une photo</div>
    <img id="photo-prev" alt="aperçu">
    <button id="btn-del-photo" onclick="clearPhoto()">✕ Supprimer la photo</button>
    <div id="photo-info" class="photo-info"></div>
  </div>

  <button id="btn-save" onclick="saveVisite()">Enregistrer la visite</button>
  <div id="form-hint">Saisissez le client et le chantier</div>

</div>

<!-- PAGE LISTE -->
<div id="page-liste" class="page">
  <div class="stats">
    <div class="schip"><strong id="s-total">0</strong>Visites</div>
    <div class="schip"><strong id="s-photos">0</strong>Photos</div>
    <div class="schip"><strong id="s-today">0</strong>Aujourd'hui</div>
  </div>
  <div id="liste-content"></div>
</div>

<!-- MODAL EXPORT -->
<div id="overlay" onclick="closeExport()">
  <div id="modal" onclick="event.stopPropagation()">
    <h2>Exporter la tournée</h2>
    <p id="modal-sub">—</p>
    <button class="mbtn" style="background:var(--green);color:#fff" onclick="doJSON()">📄 Télécharger le JSON</button>
    <button class="mbtn" style="background:var(--blue);color:#fff" onclick="doDrive()">☁ Ouvrir Google Drive</button>
    <button class="mbtn" style="background:var(--bg);border:1px solid var(--border)" onclick="closeExport()">Annuler</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── ÉTAT ──
var photoB64 = '', photoNom = '';

// ── STOCKAGE ──
function getDB() {
  try { return JSON.parse(localStorage.getItem('terrain_v8') || '[]'); } catch(e) { return []; }
}
function saveDB(db) {
  try { localStorage.setItem('terrain_v8', JSON.stringify(db)); } catch(e) { toast('⚠ Stockage plein !'); }
}

// ── NAVIGATION ──
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'liste') renderListe();
}

// ── PHOTO ──
function handlePhoto(e) {
  var file = e.target.files[0]; if (!file) return;
  var ts  = Date.now();
  photoNom = 'terrain_' + ts + '.jpg';

  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var MAX = 1200, w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    photoB64 = canvas.toDataURL('image/jpeg', 0.82);
    URL.revokeObjectURL(url);

    // Téléchargement automatique dans Téléchargements → galerie Android
    var a = document.createElement('a');
    a.href = photoB64; a.download = photoNom;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

    document.getElementById('photo-zone').style.display = 'none';
    document.getElementById('photo-prev').src = photoB64;
    document.getElementById('photo-prev').style.display = 'block';
    document.getElementById('btn-del-photo').style.display = 'inline-block';
    var info = document.getElementById('photo-info');
    info.textContent = '💾 ' + photoNom + ' → Téléchargements';
    info.style.display = 'block';
    checkForm();
    toast('📷 Photo sauvegardée dans Téléchargements');
  };
  img.src = url;
}

function clearPhoto() {
  photoB64 = ''; photoNom = '';
  document.getElementById('file-inp').value = '';
  document.getElementById('photo-zone').style.display = 'block';
  document.getElementById('photo-prev').style.display = 'none';
  document.getElementById('btn-del-photo').style.display = 'none';
  document.getElementById('photo-info').style.display = 'none';
}

// ── VALIDATION ──
function checkForm() {
  var ok = document.getElementById('f-client').value.trim() !== ''
        && document.getElementById('f-chantier').value.trim() !== '';
  document.getElementById('btn-save').classList.toggle('ready', ok);
  document.getElementById('form-hint').textContent = ok ? '✓ Prêt à enregistrer' : 'Saisissez le client et le chantier';
}
document.getElementById('f-client').addEventListener('input', checkForm);
document.getElementById('f-chantier').addEventListener('input', checkForm);

// ── SAUVEGARDE ──
function saveVisite() {
  var client   = document.getElementById('f-client').value.trim();
  var chantier = document.getElementById('f-chantier').value.trim();
  if (!client || !chantier) { toast('Saisissez le client et le chantier'); return; }

  var now = new Date();
  var rec = {
    id:          now.getTime(),
    date:        now.toLocaleDateString('fr-FR'),
    heure:       now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    client:      client,
    chantier:    chantier,
    localisation: document.getElementById('f-loc').value.trim(),
    commentaire: document.getElementById('f-comment').value.trim(),
    photo:       photoNom
  };

  var db = getDB(); db.push(rec); saveDB(db);
  updateHeader(); resetForm();
  toast('✓ Visite enregistrée !');
}

// ── RESET ──
function resetForm() {
  // On NE vide PAS client et chantier pour faciliter plusieurs saisies
  document.getElementById('f-loc').value = '';
  document.getElementById('f-comment').value = '';
  clearPhoto();
  window.scrollTo(0,0);
}

// ── HEADER ──
function updateHeader() {
  var n = getDB().length;
  document.getElementById('hdr-count').textContent = n + (n > 1 ? ' visites' : ' visite');
}

// ── LISTE ──
function renderListe() {
  var db    = getDB().slice().reverse();
  var today = new Date().toLocaleDateString('fr-FR');
  var photos = 0, todays = 0;
  for (var i = 0; i < db.length; i++) {
    if (db[i].photo) photos++;
    if (db[i].date === today) todays++;
  }
  document.getElementById('s-total').textContent  = db.length;
  document.getElementById('s-photos').textContent = photos;
  document.getElementById('s-today').textContent  = todays;
  var el = document.getElementById('liste-content');
  if (!db.length) { el.innerHTML = '<div class="empty">📋 Aucune visite enregistrée</div>'; return; }
  var html = '';
  for (var j = 0; j < db.length; j++) {
    var d = db[j];
    var thumb = d.photo
      ? '<div class="dnophoto" title="' + d.photo + '">📷</div>'
      : '<div class="dnophoto">🏗</div>';
    html += '<div class="ditem">' + thumb
      + '<div class="dbody">'
      + '<div class="dtitle">' + d.client + ' — ' + d.chantier + '</div>'
      + '<div class="dmeta">'
      + d.date + ' à ' + d.heure
      + (d.localisation ? '<br>📍 ' + d.localisation : '')
      + (d.photo        ? '<br>📷 ' + d.photo : '')
      + (d.commentaire  ? '<br><em>' + d.commentaire + '</em>' : '')
      + '</div></div>'
      + '<button class="ddel" onclick="delItem(' + d.id + ')">✕</button>'
      + '</div>';
  }
  el.innerHTML = html;
}

function delItem(id) {
  var db = getDB().filter(function(d){ return d.id !== id; });
  saveDB(db); renderListe(); updateHeader(); toast('Supprimé');
}

// ── EXPORT ──
function openExport() {
  var db = getDB();
  if (!db.length) { toast('Aucune visite à exporter'); return; }
  var photos = db.filter(function(d){ return d.photo; }).length;
  document.getElementById('modal-sub').textContent = db.length + ' visite(s) · ' + photos + ' photo(s) dans vos Téléchargements';
  document.getElementById('overlay').classList.add('open');
}
function closeExport() { document.getElementById('overlay').classList.remove('open'); }

function doJSON() {
  var db      = getDB();
  var dateStr = new Date().toLocaleDateString('fr-FR').replace(/\//g,'-');
  // Export uniquement les champs utiles
  var export_data = db.map(function(v) {
    return {
      client:       v.client,
      chantier:     v.chantier,
      localisation: v.localisation,
      commentaire:  v.commentaire,
      date:         v.date,
      heure:        v.heure,
      photo:        v.photo || ''
    };
  });
  var blob = new Blob([JSON.stringify(export_data, null, 2)], { type: 'application/json;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tournee_' + dateStr + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  closeExport(); toast('JSON téléchargé ✓');
}

function doDrive() {
  window.open('https://drive.google.com', '_blank');
  closeExport();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

// Init
(function(){
  updateHeader();
})();
</script>
</body>
</html>
